<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --peach-l:      #E89878;
  --rosa-l:       #E29BB5;
  --minze-l:      #7CC4A7;
  --buttermilk-l: #D9B85A;
  --violet-l:     #A98AC9;

  --peach-d:      #F0AE92;
  --rosa-d:       #E5A8BC;
  --minze-d:      #9DD4BC;
  --buttermilk-d: #E5C77A;
  --violet-d:     #BFA5DA;
}

[data-theme="light"] {
  --peach:      var(--peach-l);
  --rosa:       var(--rosa-l);
  --minze:      var(--minze-l);
  --buttermilk: var(--buttermilk-l);
  --violet:     var(--violet-l);

  --peach-tint:      #FBEBE2;
  --rosa-tint:       #FAE3EC;
  --minze-tint:      #E5F1EB;
  --buttermilk-tint: #F6EBCB;
  --violet-tint:     #ECE2F2;

  --bg:        #F6F2EC;
  --surface:   #FBF8F2;
  --surface-2: #EFE9E0;
  --line:      #E0D8CC;
  --line-2:    #CFC4B5;
  --text:      #221F1B;
  --text-2:    #6F665C;
  --text-3:    #9A9082;

  --on-accent: #1A1714;
  --shadow-1: 0 1px 2px rgba(40, 30, 20, 0.04);
  --shadow-3: 0 12px 40px rgba(40, 30, 20, 0.10);
}

[data-theme="dark"] {
  --peach:      var(--peach-d);
  --rosa:       var(--rosa-d);
  --minze:      var(--minze-d);
  --buttermilk: var(--buttermilk-d);
  --violet:     var(--violet-d);

  --peach-tint:      #3D2A21;
  --rosa-tint:       #3A252D;
  --minze-tint:      #1F2F28;
  --buttermilk-tint: #322A1A;
  --violet-tint:     #2C2433;

  --bg:        #1A1816;
  --surface:   #252220;
  --surface-2: #2F2B28;
  --line:      #38332F;
  --line-2:    #4A443F;
  --text:      #F2EDE5;
  --text-2:    #B0A89D;
  --text-3:    #7A736A;

  --on-accent: #1A1714;
  --shadow-1: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-3: 0 16px 48px rgba(0, 0, 0, 0.6);
}

.zone-peach      { --zone: var(--peach);      --zone-tint: var(--peach-tint); }
.zone-rosa       { --zone: var(--rosa);       --zone-tint: var(--rosa-tint); }
.zone-minze      { --zone: var(--minze);      --zone-tint: var(--minze-tint); }
.zone-buttermilk { --zone: var(--buttermilk); --zone-tint: var(--buttermilk-tint); }
.zone-violet     { --zone: var(--violet);     --zone-tint: var(--violet-tint); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { background: var(--bg); }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
  transition: background 0.3s ease, color 0.3s ease;
  min-height: 100vh;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; font-size: inherit; }

input, select, textarea {
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  background: transparent;
  border: none;
  outline: none;
  width: 100%;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
  border-radius: 0;
  transition: border-color 0.2s ease;
}
input:focus, select:focus, textarea:focus { border-color: var(--zone, var(--text)); }
input::placeholder { color: var(--text-3); }

select {
  appearance: none;
  background-image: linear-gradient(45deg, transparent 50%, var(--text-2) 50%),
                    linear-gradient(135deg, var(--text-2) 50%, transparent 50%);
  background-position: calc(100% - 12px) center, calc(100% - 7px) center;
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
  padding-right: 24px;
}

input[type="date"], input[type="time"] { color-scheme: light dark; }
[data-theme="dark"] input[type="date"], [data-theme="dark"] input[type="time"] { color-scheme: dark; }

::selection { background: var(--zone-tint, var(--peach-tint)); color: var(--text); }

.app {
  max-width: 1080px;
  margin: 0 auto;
  padding: 32px 32px 80px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 28px;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--line);
}

.brand {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.02em;
  font-style: italic;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.brand-mark {
  font-style: normal;
  font-weight: 600;
  font-size: 26px;
  line-height: 0.8;
  position: relative;
  top: 2px;
  background: linear-gradient(135deg, var(--peach), var(--rosa) 30%, var(--violet) 60%, var(--minze));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.theme-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 50%;
  transition: color 0.2s ease, border-color 0.2s ease;
}
.theme-btn:hover { color: var(--text); border-color: var(--line-2); }
.theme-btn svg { width: 16px; height: 16px; }

.tabs {
  display: flex;
  gap: 32px;
  margin-bottom: 48px;
  border-bottom: 1px solid var(--line);
}
.tab {
  padding: 0 0 16px 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.06em;
  position: relative;
  transition: color 0.2s ease;
  text-transform: uppercase;
}
.tab:hover { color: var(--text-2); }
.tab.active { color: var(--text); }
.tab.active::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: -1px;
  height: 2px;
  background: var(--tab-color, var(--peach));
}
.tab[data-tab="expenses"].active::after { background: var(--peach); }
.tab[data-tab="events"].active::after   { background: var(--minze); }

.section {
  margin-bottom: 64px;
}
.section-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
  gap: 16px;
  flex-wrap: wrap;
}
.section-title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 28px;
  letter-spacing: -0.02em;
  line-height: 1;
}
.section-title em {
  font-style: italic;
  color: var(--zone, var(--peach));
}
.section-meta {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 500;
}

/* =========================================================
   KARTEN — fest 3 Stück, kein "+ Neu"
   ========================================================= */
.cards-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.cc {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 20px;
  cursor: pointer;
  position: relative;
  transition: border-color 0.2s ease, transform 0.2s ease;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 140px;
  overflow: hidden;
}
.cc::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--cc-color);
}
.cc:hover { border-color: var(--line-2); transform: translateY(-2px); }
.cc.selected {
  border-color: var(--cc-color);
  box-shadow: 0 0 0 1px var(--cc-color), var(--shadow-1);
}
.cc-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.cc-type-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.005em;
}
.cc-logo {
  height: 18px;
  display: flex;
  align-items: center;
  color: var(--text-2);
  flex-shrink: 0;
}
.cc-logo svg { height: 100%; width: auto; }
.cc-amount {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin-top: auto;
  line-height: 1;
}
.cc-month {
  font-size: 10px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 500;
  margin-top: 4px;
}
.cc-pending {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--cc-color);
  margin-top: 8px;
  line-height: 1.3;
}

.month-nav {
  display: flex;
  align-items: center;
  gap: 12px;
}
.month-nav-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
  transition: color 0.2s ease, background 0.2s ease;
  font-size: 18px;
  border-radius: 50%;
}
.month-nav-btn:hover { color: var(--text); background: var(--surface); }
.month-label {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 18px;
  font-weight: 400;
  min-width: 140px;
  text-align: center;
  letter-spacing: -0.01em;
}

.form-grid {
  display: grid;
  grid-template-columns: 2fr 1.2fr 1fr;
  column-gap: 24px;
  row-gap: 0;
}
.form-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  column-gap: 24px;
  margin-top: 8px;
}
.field-stack {
  display: flex;
  flex-direction: column;
}
.field-label {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 500;
}
.form-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
  gap: 16px;
  flex-wrap: wrap;
}
.recurring-toggle {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text-2);
  cursor: pointer;
  user-select: none;
}
.recurring-toggle input { width: auto; padding: 0; border: none; accent-color: var(--zone, var(--peach)); cursor: pointer; }

.btn {
  font-size: 13px;
  font-weight: 500;
  padding: 12px 24px;
  border-radius: 100px;
  letter-spacing: 0.02em;
  transition: background 0.2s ease, transform 0.15s ease, color 0.2s ease, filter 0.2s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-primary {
  background: var(--zone, var(--peach));
  color: var(--on-accent);
}
.btn-primary:hover { transform: translateY(-1px); filter: brightness(1.05); }
.btn-ghost {
  background: transparent;
  color: var(--text-2);
  padding: 12px 16px;
}
.btn-ghost:hover { color: var(--text); }
.btn-danger {
  background: transparent;
  color: #C7726B;
  padding: 12px 16px;
}
.btn-danger:hover { color: #A85048; }

.stats-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 32px;
}
.stat {
  background: var(--surface);
  padding: 20px 24px;
}
.stat-label {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  font-weight: 500;
}
.stat-value {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1;
}
.stat-trend-up   { color: #C7726B; }
.stat-trend-down { color: #6BA383; }

.chart {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.bar-row {
  display: grid;
  grid-template-columns: 160px 1fr 90px;
  gap: 16px;
  align-items: center;
  font-size: 13px;
}
.bar-cat { color: var(--text); font-weight: 500; }
.bar-track {
  height: 6px;
  background: var(--surface-2);
  border-radius: 100px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: var(--zone, var(--buttermilk));
  border-radius: 100px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.bar-amount {
  text-align: right;
  font-family: 'Fraunces', serif;
  font-size: 14px;
  color: var(--text-2);
  letter-spacing: -0.01em;
}

.expense-list-wrap {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 8px 24px;
}
.exp-item {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 24px;
  align-items: center;
  padding: 18px 0;
  border-bottom: 1px solid var(--line);
  transition: padding 0.2s ease;
}
.exp-item:last-child { border-bottom: none; }
.exp-item:hover { padding-left: 8px; }
.exp-main {
  display: flex;
  align-items: center;
  gap: 16px;
  min-width: 0;
}
.exp-emoji {
  font-size: 18px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  border-radius: 50%;
  flex-shrink: 0;
}
.exp-text { min-width: 0; }
.exp-desc {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  word-break: break-word;
  overflow-wrap: anywhere;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.exp-meta {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.booking-hint {
  font-style: italic;
  color: var(--text-3);
  font-family: 'Fraunces', serif;
  font-size: 12px;
}
.eigen-hint {
  font-style: italic;
  color: var(--minze);
  font-family: 'Fraunces', serif;
  font-size: 12px;
}
[data-theme="dark"] .eigen-hint { color: var(--minze); }
.cc-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.cc-pill::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--pill-color, var(--peach));
}
.exp-amount {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.01em;
  white-space: nowrap;
}
.recurring-tag {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--violet);
  border: 1px solid var(--violet);
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
}
.exp-del {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
  font-size: 14px;
  border-radius: 50%;
  transition: color 0.2s ease, background 0.2s ease;
  opacity: 0;
}
.exp-item:hover .exp-del { opacity: 1; }
.exp-del:hover { color: #C7726B; background: var(--bg); }

.quick-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
  margin-bottom: 24px;
}
.qt {
  padding: 8px 14px;
  border-radius: 100px;
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text-2);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.01em;
  transition: all 0.18s ease;
}
.qt:hover { border-color: var(--line-2); color: var(--text); }
.qt.active {
  background: var(--minze);
  border-color: var(--minze);
  color: var(--on-accent);
}

.week {
  margin-bottom: 56px;
}
.week-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.week-name {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1;
}
.week-name em { font-style: italic; }
.week-name.current em { color: var(--minze); }
.week-range {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 500;
}

.day-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 12px;
}
.day {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 12px 10px;
  min-height: 130px;
  display: flex;
  flex-direction: column;
  position: relative;
  transition: border-color 0.2s ease;
}
.day:hover { border-color: var(--line-2); }
.day.today {
  border-color: var(--minze);
  background: var(--minze-tint);
}
.day-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
}
.day.today .day-head { border-color: rgba(0,0,0,0.08); }
[data-theme="dark"] .day.today .day-head { border-color: rgba(255,255,255,0.1); }
.day-name {
  font-size: 10px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 500;
}
.day.today .day-name { color: var(--text-2); }
.day-num {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 0.9;
}
.events-stack {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.evt {
  background: var(--bg);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 12px;
  cursor: pointer;
  border-left: 3px solid var(--evt-color, var(--minze));
  transition: transform 0.15s ease;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
[data-theme="dark"] .evt { background: var(--surface-2); }
.day.today .evt { background: var(--surface); }
.evt:hover { transform: translateX(2px); }
.evt-time {
  font-size: 10px;
  color: var(--text-3);
  font-weight: 500;
  letter-spacing: 0.02em;
}
.evt-text {
  color: var(--text);
  font-weight: 500;
  word-break: break-word;
  overflow-wrap: anywhere;
  white-space: normal;
  line-height: 1.3;
}
.evt-recurring {
  font-size: 9px;
  color: var(--text-3);
  font-style: italic;
  font-family: 'Fraunces', serif;
  letter-spacing: 0.02em;
  margin-top: 2px;
}

/* Farb-Picker im Termin-Formular */
.evt-color-row {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
}
.evt-color-pick {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: transform 0.15s ease;
  position: relative;
  background: var(--surface-2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  font-family: 'Fraunces', serif;
}
.evt-color-pick::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1px solid var(--text);
  opacity: 0;
}
.evt-color-pick:hover { transform: scale(1.1); }
.evt-color-pick.active::after { opacity: 1; }
.evt-color-auto { font-style: italic; }
.day-add {
  margin-top: auto;
  padding-top: 8px;
  font-size: 16px;
  color: var(--text-3);
  background: transparent;
  text-align: center;
  border-radius: 6px;
  font-weight: 300;
  line-height: 1;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s ease, background 0.2s ease;
}
.day-add:hover { color: var(--text); background: var(--surface-2); }
.day.today .day-add:hover { background: rgba(0,0,0,0.06); }
[data-theme="dark"] .day.today .day-add:hover { background: rgba(255,255,255,0.06); }

.modal-bg {
  position: fixed; inset: 0;
  background: rgba(20, 15, 10, 0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 100;
}
[data-theme="dark"] .modal-bg { background: rgba(0, 0, 0, 0.65); }
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 32px;
  max-width: 460px;
  width: 100%;
  box-shadow: var(--shadow-3);
  max-height: 90vh;
  overflow-y: auto;
}
.modal-title {
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 400;
  letter-spacing: -0.02em;
  margin-bottom: 24px;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 4px;
  margin-top: 28px;
  flex-wrap: wrap;
  row-gap: 8px;
}
.modal-info {
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.6;
}
.modal-info-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
}
.modal-info-row:last-child { border: none; }
.modal-info-label {

  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-3);

.empty {

@media (max-width: 880px) {
  .app { padding: 24px 20px 60px; }
  .form-grid { grid-template-columns: 1fr; row-gap: 0; }

<script>
const STORAGE_KEY = 'nicole_tracker_v2';   // <- neuer Key, alter Stand wird ignoriert

/* =========================================================
   FESTE KARTEN — werden nicht angelegt, sind einfach da
   ========================================================= */
const CARDS = [
  { id: 'amex', name: 'Amex',      color: 'peach',      logo: 'amex' },
  { id: 'visa', name: 'Visa',      color: 'rosa',       logo: 'visa' },
  { id: 'giro', name: 'Girokonto', color: 'minze',      logo: 'giro' }
];

const COLOR_VAR = {
  peach:      'var(--peach)',
  rosa:       'var(--rosa)',
  minze:      'var(--minze)',
  buttermilk: 'var(--buttermilk)',
  violet:     'var(--violet)'
};

const CARD_LOGOS = {
  visa: `<svg viewBox="0 0 64 20" xmlns="http://www.w3.org/2000/svg" aria-label="Visa">
    <text x="0" y="16" font-family="Inter, sans-serif" font-weight="700" font-size="18" font-style="italic" letter-spacing="-0.5" fill="currentColor">VISA</text>
  </svg>`,
  amex: `<svg viewBox="0 0 64 20" xmlns="http://www.w3.org/2000/svg" aria-label="American Express">
    <text x="0" y="16" font-family="Inter, sans-serif" font-weight="800" font-size="15" letter-spacing="-0.3" fill="currentColor">AMEX</text>
  </svg>`,
  giro: `<svg viewBox="0 0 64 20" xmlns="http://www.w3.org/2000/svg" aria-label="Girokonto">
    <text x="0" y="16" font-family="Inter, sans-serif" font-weight="800" font-size="15" letter-spacing="-0.3" fill="currentColor">GIRO</text>
  </svg>`
};

let state = {
  theme: 'light',
  selectedCardId: 'amex',
  expenses: [],
  events: [],
  viewMonth: (() => {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  })()
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      // Nur die persistenten Felder übernehmen (cards sind hartcodiert)
      state.theme          = p.theme          ?? state.theme;
      state.selectedCardId = p.selectedCardId ?? state.selectedCardId;
      state.expenses       = Array.isArray(p.expenses) ? p.expenses : [];
      state.events         = Array.isArray(p.events)   ? p.events   : [];
      state.viewMonth      = p.viewMonth      ?? state.viewMonth;

      // Falls alte Karten-IDs in Ausgaben sind, auf 'amex' mappen
      const validIds = new Set(CARDS.map(c => c.id));
      state.expenses.forEach(e => {
        if (!validIds.has(e.cardId)) e.cardId = 'amex';
      });
      if (!validIds.has(state.selectedCardId)) state.selectedCardId = 'amex';
    }
  } catch (e) { console.warn('load failed', e); }
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      theme: state.theme,
      selectedCardId: state.selectedCardId,
      expenses: state.expenses,
      events: state.events,
      viewMonth: state.viewMonth
    }));
  } catch (e) { console.warn('save failed', e); }
}

const ICON_MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
const ICON_SUN  = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';

function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  document.body.setAttribute('data-theme', state.theme);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.innerHTML = state.theme === 'light' ? ICON_MOON : ICON_SUN;
}

document.getElementById('themeToggle').addEventListener('click', () => {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  applyTheme();
  saveState();
});

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    const tab = t.dataset.tab;
    document.getElementById('tab-expenses').style.display = tab === 'expenses' ? '' : 'none';
    document.getElementById('tab-events').style.display = tab === 'events' ? '' : 'none';
    if (tab === 'events') renderWeeks();
  });
});

/* ---------------------------------------------------------
   KARTEN — Render der 3 festen Karten
--------------------------------------------------------- */
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  CARDS.forEach(c => {
    // Was wird im angezeigten Monat ABGEBUCHT (=fertige Buchungen)
    const bookedTotal = getMonthExpenses(state.viewMonth, 'booking')
      .filter(e => e.cardId === c.id)
      .reduce((s, e) => s + e.amount, 0);

    // Käufe aus dem angezeigten Monat, die ERST SPÄTER abgebucht werden (= "noch unterwegs")
    const pendingTotal = getMonthExpenses(state.viewMonth, 'expense')
      .filter(e => e.cardId === c.id)
      .filter(e => computeBookingDate(e.cardId, e.date).slice(0, 7) > state.viewMonth)
      .reduce((s, e) => s + e.amount, 0);

    const div = document.createElement('div');
    div.className = 'cc' + (state.selectedCardId === c.id ? ' selected' : '');
    div.style.setProperty('--cc-color', COLOR_VAR[c.color]);
    div.innerHTML = `
      <div class="cc-top">
        <div class="cc-type-name">${c.name}</div>
        <div class="cc-logo">${CARD_LOGOS[c.logo]}</div>
      </div>
      <div>
        <div class="cc-amount">${formatEUR(bookedTotal)}</div>
        <div class="cc-month">Abbuchung ${monthLabel(state.viewMonth)}</div>
        ${pendingTotal > 0 ? `<div class="cc-pending">+ ${formatEUR(pendingTotal)} folgt im nächsten Monat</div>` : ''}
      </div>
    `;
    div.addEventListener('click', () => {
      state.selectedCardId = c.id;
      saveState();
      renderCards();
      renderCardSelect();
    });
    grid.appendChild(div);
  });
}

function renderCardSelect() {
  const sel = document.getElementById('expCard');
  sel.innerHTML = '';
  CARDS.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    if (c.id === state.selectedCardId) opt.selected = true;
    sel.appendChild(opt);
  });
}

/* ---------------------------------------------------------
   AUSGABEN
--------------------------------------------------------- */

// Berechnet das Buchungsdatum (wann die Bank wirklich abbucht)
// basierend auf Karte und Ausgabedatum.
function computeBookingDate(cardId, expenseDateISO) {
  const [y, m, d] = expenseDateISO.split('-').map(Number);

  if (cardId === 'giro') {
    // Girokonto: direkt am gleichen Tag
    return expenseDateISO;
  }

  if (cardId === 'amex') {
    // Bis einschließlich 21. → Abbuchung am 22. desselben Monats
    // Ab 22. → Abbuchung am 22. des Folgemonats
    let bookY = y, bookM = m;
    if (d > 21) {
      bookM += 1;
      if (bookM > 12) { bookM = 1; bookY += 1; }
    }
    return bookY + '-' + String(bookM).padStart(2, '0') + '-22';
  }

  if (cardId === 'visa') {
    // Visa: 30 Tage nach Ausgabe
    const dateObj = new Date(y, m - 1, d);
    dateObj.setDate(dateObj.getDate() + 30);
    const by = dateObj.getFullYear();
    const bm = dateObj.getMonth() + 1;
    const bd = dateObj.getDate();
    return by + '-' + String(bm).padStart(2, '0') + '-' + String(bd).padStart(2, '0');
  }

  return expenseDateISO;
}

// Liefert Ausgaben für einen Monat.
// mode = 'expense'  → gefiltert nach Ausgabedatum (was man wann gekauft hat)
// mode = 'booking'  → gefiltert nach Buchungsdatum (was wann von der Karte abgeht)
function getMonthExpenses(yyyymm, mode = 'expense') {
  const matchesMonth = (e) => {
    if (mode === 'booking') {
      return computeBookingDate(e.cardId, e.date).startsWith(yyyymm);
    }
    return e.date.startsWith(yyyymm);
  };

  const direct = state.expenses.filter(matchesMonth);

  // Wiederkehrende Ausgaben (Abos): in Folgemonate projizieren
  const recurring = [];
  state.expenses.forEach(e => {
    if (!e.recurring) return;
    const startMonth = e.date.slice(0, 7);
    if (startMonth < yyyymm) {
      // Projizierte Instanz für diesen Monat erzeugen
      const projectedDate = yyyymm + '-' + e.date.slice(8, 10);
      const projected = {
        ...e,
        id: e.id + '_' + yyyymm,
        date: projectedDate,
        recurringSource: e.id,
        isProjected: true
      };
      // Im richtigen Monat anzeigen?
      if (matchesMonth(projected)) {
        // Doppelte vermeiden falls schon direkt vorhanden
        const exists = direct.some(d => d.recurringSource === e.id);
        if (!exists) recurring.push(projected);
      }
    }
  });
  return [...direct, ...recurring];
}

document.getElementById('addExpenseBtn').addEventListener('click', () => {
  const desc = document.getElementById('expDesc').value.trim();
  const cat = document.getElementById('expCategory').value;
  const amount = parseFloat(document.getElementById('expAmount').value);
  const cardId = document.getElementById('expCard').value;
  const date = document.getElementById('expDate').value || todayISO();
  const recurring = document.getElementById('expRecurring').checked;
  const eigenRaw = document.getElementById('expEigen').value;
  const eigenAmount = eigenRaw === '' ? null : parseFloat(eigenRaw);

  if (!desc) { document.getElementById('expDesc').focus(); return; }
  if (isNaN(amount) || amount <= 0) { document.getElementById('expAmount').focus(); return; }
  if (eigenAmount !== null && (isNaN(eigenAmount) || eigenAmount < 0)) {
    document.getElementById('expEigen').focus(); return;
  }

  state.expenses.push({
    id: 'e' + Date.now(),
    desc, category: cat, amount, cardId, date, recurring,
    eigenAmount: (eigenAmount && eigenAmount > 0) ? eigenAmount : null
  });
  saveState();

  document.getElementById('expEigen').value = '';

function deleteExpense(id) {
  if (!confirm('Diese Ausgabe wirklich löschen?')) return;
  state.expenses = state.expenses.filter(e => e.id !== id);
  saveState();
  renderExpensesTab();
}

function renderExpenseList() {
  const list = document.getElementById('expenseList');
  const items = getMonthExpenses(state.viewMonth)
    .sort((a, b) => b.date.localeCompare(a.date));

  document.getElementById('listMeta').textContent =
    items.length === 0 ? 'Keine Buchungen' : `${items.length} ${items.length === 1 ? 'Eintrag' : 'Einträge'}`;

  if (items.length === 0) {
    list.innerHTML = '<div class="empty">Noch keine Buchungen in diesem Monat</div>';
    return;
  }

  list.innerHTML = '';
  items.forEach(e => {
    const card = CARDS.find(c => c.id === e.cardId);
    const cardColor = card ? COLOR_VAR[card.color] : 'var(--text-3)';
    const cardName = card ? card.name : 'Keine Karte';
    const emoji = e.category.split(' ')[0];
    const catLabel = e.category.split(' ').slice(1).join(' ');
    const recurringTag = e.recurring || e.isProjected
      ? '<span class="recurring-tag">Abo</span>' : '';

    // Buchungsdatum berechnen
    const bookingDate = computeBookingDate(e.cardId, e.date);
    const sameMonth = bookingDate.slice(0, 7) === e.date.slice(0, 7);
    const sameDay = bookingDate === e.date;
    const bookingHint = sameDay
      ? '' // Girokonto: keine extra Info nötig
      : `<span class="booking-hint">→ abgebucht ${formatDateShort(bookingDate)}</span>`;

    const eigenHint = (e.eigenAmount && e.eigenAmount > 0)
      ? `<span class="eigen-hint">davon mein: ${formatEUR(e.eigenAmount)}</span>`
      : '';

    const item = document.createElement('div');
    item.className = 'exp-item';
    item.innerHTML = `
      <div class="exp-main">
        <div class="exp-emoji">${emoji}</div>
        <div class="exp-text">
          <div class="exp-desc">${escapeHtml(e.desc)} ${recurringTag}</div>
          <div class="exp-meta">
            <span class="cc-pill" style="--pill-color:${cardColor}">${escapeHtml(cardName)}</span>
            <span>·</span>
            <span>${escapeHtml(catLabel)}</span>
            <span>·</span>
            <span>${formatDateShort(e.date)}</span>
            ${bookingHint}
            ${eigenHint}
          </div>
        </div>
      </div>
      <div class="exp-amount">${formatEUR(e.amount)}</div>
      <button class="exp-del" title="Löschen" aria-label="Löschen">×</button>
    `;
    item.querySelector('.exp-del').addEventListener('click', () => {
      const idToDelete = e.isProjected ? e.recurringSource : e.id;
      deleteExpense(idToDelete);
    });
    list.appendChild(item);
  });
}

function renderStats() {
  // Ausgaben nach Ausgabedatum (was wurde diesen Monat gekauft)
  const expenseItems = getMonthExpenses(state.viewMonth, 'expense');
  const expenseTotal = expenseItems.reduce((s, e) => s + e.amount, 0);
  const recurringTotal = expenseItems.filter(e => e.recurring || e.isProjected).reduce((s, e) => s + e.amount, 0);
  const count = expenseItems.length;

  // Buchungen nach Buchungsdatum (was wird diesen Monat tatsächlich abgebucht)
  const bookingItems = getMonthExpenses(state.viewMonth, 'booking');
  const bookingTotal = bookingItems.reduce((s, e) => s + e.amount, 0);

  const prev = prevMonth(state.viewMonth);
  const prevTotal = getMonthExpenses(prev, 'expense').reduce((s, e) => s + e.amount, 0);
  let trendLabel = '–';
  let trendClass = '';
  if (prevTotal > 0) {
    const diff = ((expenseTotal - prevTotal) / prevTotal) * 100;
    trendLabel = (diff >= 0 ? '+' : '') + diff.toFixed(0) + '%';
    trendClass = diff >= 0 ? 'stat-trend-up' : 'stat-trend-down';
  } else if (expenseTotal > 0) {
    trendLabel = 'neu';
  }

  document.getElementById('statsMonthMeta').textContent = monthLabel(state.viewMonth);

  // Eigener Anteil aus Ausgabe-Items aufsummieren (nur wenn Wert gesetzt)
  const eigenTotal = expenseItems
    .filter(e => e.eigenAmount && e.eigenAmount > 0)
    .reduce((s, e) => s + e.eigenAmount, 0);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat">
      <div class="stat-label">Ausgegeben</div>
      <div class="stat-value">${formatEUR(expenseTotal)}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Abbuchung gesamt</div>
      <div class="stat-value">${formatEUR(bookingTotal)}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Mein Anteil</div>
      <div class="stat-value">${formatEUR(eigenTotal)}</div>
    </div>
    <div class="stat">
      <div class="stat-label">vs. Vormonat</div>
      <div class="stat-value ${trendClass}">${trendLabel}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Buchungen</div>
      <div class="stat-value">${count}</div>
    </div>
  `;

  // Diagramm: nach Ausgaben (Kategorien)
  const byCat = {};
  expenseItems.forEach(e => { byCat[e.category] = (byCat[e.category] || 0) + e.amount; });
  const sorted = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
  const max = sorted.length ? sorted[0][1] : 1;

  const chart = document.getElementById('categoryChart');
  if (sorted.length === 0) {
    chart.innerHTML = '<div class="empty">Daten erscheinen, sobald du Ausgaben hinzufügst</div>';
    return;
  }
  chart.innerHTML = sorted.map(([cat, val]) => {
    const pct = (val / max) * 100;
    return `
      <div class="bar-row">
        <div class="bar-cat">${escapeHtml(cat)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-amount">${formatEUR(val)}</div>
      </div>
    `;
  }).join('');
}

// Prüft ob ein Termin an einem bestimmten ISO-Datum auftritt
// Berücksichtigt Wiederholungen (weekly/monthly) UND Overrides (einzelne gelöschte/verschobene Instanzen)
function eventOccursOn(ev, isoDate) {
  // 1. Wenn diese Instanz explizit gelöscht wurde → false
  if (ev.overrides && ev.overrides[isoDate] === null) return false;

  // 2. Wenn eine andere Instanz auf dieses Datum VERSCHOBEN wurde → true
  if (ev.overrides) {
    for (const [origDate, override] of Object.entries(ev.overrides)) {
      if (override && override.date === isoDate) return true;
    }
  }

  // 3. Reguläre Wiederholungs-Logik
  // Termin kann nicht vor seinem Startdatum auftreten
  if (isoDate < ev.date) return false;

  // Direkter Match (am Original-Datum)
  if (ev.date === isoDate) {
    // Aber nur wenn nicht selbst verschoben
    if (ev.overrides && ev.overrides[isoDate] && ev.overrides[isoDate].date && ev.overrides[isoDate].date !== isoDate) return false;
    return true;
  }

  // Keine Wiederholung → nur am Startdatum
  if (!ev.recurrence) return false;

  const [sy, sm, sd] = ev.date.split('-').map(Number);
  const [cy, cm, cd] = isoDate.split('-').map(Number);

  let isRecurringMatch = false;
  if (ev.recurrence === 'weekly') {
    const start = new Date(sy, sm - 1, sd);
    const cur = new Date(cy, cm - 1, cd);
    const diffDays = Math.round((cur - start) / 86400000);
    isRecurringMatch = diffDays > 0 && diffDays % 7 === 0;
  }
  if (ev.recurrence === 'monthly') {
    if (cd === sd && ((cy > sy) || (cy === sy && cm > sm))) isRecurringMatch = true;
  }

  if (!isRecurringMatch) return false;

  // Match aus Recurrence — aber wenn diese Instanz auf ein anderes Datum verschoben wurde, hier nicht zeigen
  if (ev.overrides && ev.overrides[isoDate] && ev.overrides[isoDate].date && ev.overrides[isoDate].date !== isoDate) return false;

  return true;
}

// Liefert für ein Datum die "effektiven" Termin-Werte (mit Override-Anwendung)
function resolveEventForDate(ev, isoDate) {
  // Standard-Werte aus dem Original-Termin
  let resolved = {
    ...ev,
    occurrenceDate: isoDate,    // an welchem Tag erscheint die Instanz
    sourceDate: isoDate          // welcher Override-Key gilt
  };

  // Falls eine andere Instanz auf dieses Datum verschoben wurde → diese Werte nehmen
  if (ev.overrides) {
    for (const [origDate, override] of Object.entries(ev.overrides)) {
      if (override && override.date === isoDate) {
        resolved = { ...resolved, ...override, sourceDate: origDate };
        return resolved;
      }
    }
    // Override für genau dieses Datum (geändert ohne Verschiebung)
    if (ev.overrides[isoDate] && ev.overrides[isoDate] !== null) {
      resolved = { ...resolved, ...ev.overrides[isoDate], sourceDate: isoDate };
    }
  }

  return resolved;
}

function renderWeeks() {
  const container = document.getElementById('weeksContainer');
  container.innerHTML = '';

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const startOfWeek = new Date(today);
  const day = startOfWeek.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  startOfWeek.setDate(startOfWeek.getDate() + diff);

  const weekNames = ['Diese Woche', 'Nächste Woche', 'Übernächste Woche'];

  for (let w = 0; w < 3; w++) {
    const weekStart = new Date(startOfWeek);
    weekStart.setDate(weekStart.getDate() + w * 7);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 6);

    const block = document.createElement('div');
    block.className = 'week';

    const nameParts = weekNames[w].split(' ');
    block.innerHTML = `
      <div class="week-head">
        <h3 class="week-name ${w === 0 ? 'current' : ''}">
          ${nameParts[0]} <em>${nameParts[1]}</em>
        </h3>
        <span class="week-range">${formatDateShort(dateToLocalISO(weekStart))} – ${formatDateShort(dateToLocalISO(weekEnd))}</span>
      </div>
    `;

    const grid = document.createElement('div');
    grid.className = 'day-grid';

    const dayNames = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];

    for (let d = 0; d < 7; d++) {
      const dayDate = new Date(weekStart);
      dayDate.setDate(dayDate.getDate() + d);
      const isoDate = dateToLocalISO(dayDate);
      const isToday = dayDate.getTime() === today.getTime();

      // Liefert alle Termin-Instanzen die an diesem Tag erscheinen sollen
      // Für jede Instanz die effektiven Werte (Override-aware) berechnen
      const events = state.events
        .filter(e => eventOccursOn(e, isoDate))
        .map(e => resolveEventForDate(e, isoDate))
        .sort((a, b) => (a.time || 'zz').localeCompare(b.time || 'zz'));

      const col = document.createElement('div');
      col.className = 'day' + (isToday ? ' today' : '');
      col.innerHTML = `
        <div class="day-head">
          <span class="day-name">${dayNames[d]}</span>
          <span class="day-num">${dayDate.getDate()}</span>
        </div>
      `;

      const stack = document.createElement('div');
      stack.className = 'events-stack';
      events.forEach(ev => {
        const chip = document.createElement('div');
        chip.className = 'evt';
        chip.style.setProperty('--evt-color', COLOR_VAR[ev.color] || COLOR_VAR.minze);
        const recLabel = ev.recurrence === 'weekly' ? '↻ wöchentlich'
                       : ev.recurrence === 'monthly' ? '↻ monatlich'
                       : '';
        chip.innerHTML = `
          ${ev.time ? `<div class="evt-time">${ev.time}</div>` : ''}
          <div class="evt-text">${escapeHtml(ev.text)}</div>
          ${recLabel ? `<div class="evt-recurring">${recLabel}</div>` : ''}
        `;
        chip.addEventListener('click', () => openEventModal(ev));
        stack.appendChild(chip);
      });
      col.appendChild(stack);

      const addBtn = document.createElement('button');
      addBtn.className = 'day-add';
      addBtn.textContent = '+';
      addBtn.title = 'Termin an diesem Tag hinzufügen';
      addBtn.addEventListener('click', () => {
        document.getElementById('evtDate').value = isoDate;
        document.getElementById('evtText').focus();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      col.appendChild(addBtn);

      grid.appendChild(col);
    }

    block.appendChild(grid);
    container.appendChild(block);
  }
}

// === Termin-Modal: Anzeigen / Bearbeiten / Löschen — mit Override-Support ===
let modalContext = null; // { event, occurrenceDate, mode: 'view'|'edit', scope: 'single'|'series' }

function openEventModal(resolvedEv) {
  // Original-Event aus state finden (resolvedEv kann Override-Werte enthalten)
  const original = state.events.find(e => e.id === resolvedEv.id);
  if (!original) return;

  modalContext = {
    event: original,
    occurrenceDate: resolvedEv.occurrenceDate,
    sourceDate: resolvedEv.sourceDate,
    resolved: resolvedEv,
    mode: 'view',
    scope: null
  };
  renderEventModal();
  document.getElementById('eventModal').classList.add('open');
}

function renderEventModal() {
  const ctx = modalContext;
  if (!ctx) return;
  const isRecurring = !!ctx.event.recurrence;
  const recText = ctx.event.recurrence === 'weekly' ? 'wöchentlich'
                : ctx.event.recurrence === 'monthly' ? 'monatlich'
                : null;

  const title = document.getElementById('evtModalTitle');
  const body = document.getElementById('evtModalBody');
  const editForm = document.getElementById('evtEditForm');
  const actions = document.getElementById('evtModalActions');

  if (ctx.mode === 'view') {
    title.textContent = ctx.resolved.text;
    body.innerHTML = `
      <div class="modal-info-row">
        <span class="modal-info-label">Datum</span>
        <span>${formatDateLong(ctx.occurrenceDate)}</span>
      </div>
      ${ctx.resolved.time ? `
      <div class="modal-info-row">
        <span class="modal-info-label">Uhrzeit</span>
        <span>${ctx.resolved.time} Uhr</span>
      </div>` : ''}
      ${recText ? `
      <div class="modal-info-row">
        <span class="modal-info-label">Wiederholt</span>
        <span>${recText} ab ${formatDateShort(ctx.event.date)}</span>
      </div>` : ''}
    `;
    editForm.style.display = 'none';

    if (isRecurring) {
      actions.innerHTML = `
        <button class="btn btn-danger" id="actDelSingle">Diesen löschen</button>
        <button class="btn btn-danger" id="actDelSeries">Serie löschen</button>
        <button class="btn btn-ghost" id="actEditSingle">Diesen bearbeiten</button>
        <button class="btn btn-primary" id="actEditSeries">Serie bearbeiten</button>
      `;
      document.getElementById('actDelSingle').onclick = () => deleteOccurrence();
      document.getElementById('actDelSeries').onclick = () => deleteSeries();
      document.getElementById('actEditSingle').onclick = () => switchToEdit('single');
      document.getElementById('actEditSeries').onclick = () => switchToEdit('series');
    } else {
      actions.innerHTML = `
        <button class="btn btn-danger" id="actDelSingle">Löschen</button>
        <button class="btn btn-ghost" onclick="closeEventModal()">Schließen</button>
        <button class="btn btn-primary" id="actEditSingle">Bearbeiten</button>
      `;
      document.getElementById('actDelSingle').onclick = () => deleteSeries(); // bei Single = ganz löschen
      document.getElementById('actEditSingle').onclick = () => switchToEdit('series'); // bei Single = direkt am Original
    }
  } else if (ctx.mode === 'edit') {
    const scopeLabel = ctx.scope === 'single' ? 'Diesen Termin bearbeiten' : 'Serie bearbeiten';
    title.textContent = scopeLabel;
    body.innerHTML = ctx.scope === 'single'
      ? `<div style="font-size: 13px; color: var(--text-2); font-style: italic; font-family: 'Fraunces', serif;">Änderungen gelten nur für ${formatDateLong(ctx.occurrenceDate)}.</div>`
      : (isRecurring ? `<div style="font-size: 13px; color: var(--text-2); font-style: italic; font-family: 'Fraunces', serif;">Änderungen gelten für die gesamte Serie.</div>` : '');

    editForm.style.display = 'block';

    // Felder mit aktuellen aufgelösten Werten füllen
    document.getElementById('evtEditText').value = ctx.resolved.text;
    document.getElementById('evtEditDate').value = ctx.scope === 'single' ? ctx.occurrenceDate : ctx.event.date;
    document.getElementById('evtEditTime').value = ctx.resolved.time || '';
    const curColor = ctx.resolved.color || 'minze';
    document.querySelectorAll('#evtEditColorPicker .evt-color-pick').forEach(b => {
      b.classList.toggle('active', b.dataset.color === curColor);
    });

    actions.innerHTML = `
      <button class="btn btn-ghost" id="actCancel">Abbrechen</button>
      <button class="btn btn-primary" id="actSave">Speichern</button>
    `;
    document.getElementById('actCancel').onclick = () => { ctx.mode = 'view'; renderEventModal(); };
    document.getElementById('actSave').onclick = () => saveEdit();
  }
}

// Farb-Picker im Edit-Modal
document.querySelectorAll('#evtEditColorPicker .evt-color-pick').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#evtEditColorPicker .evt-color-pick').forEach(x =>
      x.classList.toggle('active', x === b)
    );
  });
});

function switchToEdit(scope) {
  modalContext.mode = 'edit';
  modalContext.scope = scope;
  renderEventModal();
}

function saveEdit() {
  const ctx = modalContext;
  const newText = document.getElementById('evtEditText').value.trim();
  const newDate = document.getElementById('evtEditDate').value;
  const newTime = document.getElementById('evtEditTime').value || null;
  const activeColorBtn = document.querySelector('#evtEditColorPicker .evt-color-pick.active');
  const newColor = activeColorBtn ? activeColorBtn.dataset.color : (ctx.resolved.color || 'minze');

  if (!newText) { document.getElementById('evtEditText').focus(); return; }
  if (!newDate) { document.getElementById('evtEditDate').focus(); return; }

  if (ctx.scope === 'series' || !ctx.event.recurrence) {
    // Ganze Serie / Einzeltermin: Original ändern
    ctx.event.text = newText;
    ctx.event.date = newDate;
    ctx.event.time = newTime;
    ctx.event.color = newColor;
  } else {
    // Nur diese Instanz: Override anlegen
    if (!ctx.event.overrides) ctx.event.overrides = {};
    ctx.event.overrides[ctx.sourceDate] = {
      text: newText,
      date: newDate,
      time: newTime,
      color: newColor
    };
  }

  saveState();
  closeEventModal();
  renderWeeks();
}

function deleteOccurrence() {
  const ctx = modalContext;
  if (!confirm(`Nur diesen Termin am ${formatDateLong(ctx.occurrenceDate)} löschen?\nDie Serie bleibt erhalten.`)) return;
  if (!ctx.event.overrides) ctx.event.overrides = {};
  ctx.event.overrides[ctx.sourceDate] = null; // null = gelöscht
  saveState();
  closeEventModal();
  renderWeeks();
}

function deleteSeries() {
  const ctx = modalContext;
  const isRec = !!ctx.event.recurrence;
  if (isRec && !confirm(`Wiederkehrenden Termin "${ctx.event.text}" wirklich löschen?\nAlle Wiederholungen werden entfernt.`)) return;
  if (!isRec && !confirm('Diesen Termin wirklich löschen?')) return;
  state.events = state.events.filter(e => e.id !== ctx.event.id);
  saveState();
  closeEventModal();
  renderWeeks();
}

function closeEventModal() {
  document.getElementById('eventModal').classList.remove('open');
  modalContext = null;
}
document.getElementById('eventModal').addEventListener('click', (e) => {
  if (e.target.id === 'eventModal') closeEventModal();
});

/* ---------------------------------------------------------
   HELPERS
--------------------------------------------------------- */
function todayISO() {
  // Lokales Datum, NICHT UTC — sonst Timezone-Versatz
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function dateToLocalISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function formatEUR(n) {
  return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(n);
}
function formatDateShort(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
}
function formatDateLong(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
function monthLabel(yyyymm) {
  const [y, m] = yyyymm.split('-');
  const d = new Date(parseInt(y), parseInt(m) - 1, 1);
  return d.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
}
function prevMonth(yyyymm) {
  let [y, m] = yyyymm.split('-').map(Number);
  m -= 1;
  if (m < 1) { m = 12; y -= 1; }
  return y + '-' + String(m).padStart(2, '0');
}
function nextMonth(yyyymm) {
  let [y, m] = yyyymm.split('-').map(Number);
  m += 1;
  if (m > 12) { m = 1; y += 1; }
  return y + '-' + String(m).padStart(2, '0');
}

function renderAll() {
  applyTheme();
  renderExpensesTab();
}

loadState();
document.getElementById('expDate').value = todayISO();
document.getElementById('evtDate').value = todayISO();
renderAll();
</script>
